const PERIODIZATION = [["Weeks 1–3","Accumulation","Higher volume, moderate weight. Learn movements, nail technique, build work capacity."],["Weeks 4–6","Intensification","Increase load 5–10%. Drop 1 set per exercise. Go heavier and push harder."],["Weeks 7–9","Peak Overload","Max effort. Push every working set close to failure. This is where growth happens."],["Week 10","Deload","Drop volume 40%. Same exercises, lighter weight. Let the adaptations absorb."],["Weeks 11–12","Re-accumulation","Restart the cycle at higher baseline weights. You're stronger now."]];

// ─── State ────────────────────────────────────────────────────────────────────
let S = { tab:"program", day:0, tracking:null, editMode:false, swapModal:null, logs:{}, custom:null };

function days() { return S.custom ? JSON.parse(JSON.stringify(S.custom)) : JSON.parse(JSON.stringify(DEFAULT_DAYS)); }
function today() { return new Date().toISOString().slice(0,10); }

function load() {
  try { const l=localStorage.getItem("sculpt-v2"); if(l) S.logs=JSON.parse(l); } catch{}
  try { const c=localStorage.getItem("sculpt-custom-v1"); if(c) S.custom=JSON.parse(c); } catch{}
}
function saveLogs() { try{localStorage.setItem("sculpt-v2",JSON.stringify(S.logs));}catch{} }
function saveCustom(d) { S.custom=d; try{localStorage.setItem("sculpt-custom-v1",JSON.stringify(d));}catch{} }
function resetCustom() { S.custom=null; try{localStorage.removeItem("sculpt-custom-v1");}catch{} }

function setLog(label,date,ex,si,field,val) {
  const k=`${label}|${date}`;
  if(!S.logs[k])S.logs[k]={};
  if(!S.logs[k][ex])S.logs[k][ex]={};
  if(!S.logs[k][ex][si])S.logs[k][ex][si]={};
  S.logs[k][ex][si][field]=val;
  saveLogs();
}

function swapEx(di,ei,newEx) {
  const d=days(); d[di].exercises[ei]={...newEx}; saveCustom(d); S.swapModal=null; render();
}

// ─── RENDER ROOT ─────────────────────────────────────────────────────────────
function render() {
  const app=document.getElementById("app");
  if(S.swapModal) app.innerHTML=renderSwap();
  else if(S.tracking) app.innerHTML=renderTracking();
  else app.innerHTML=renderMain();
  bind();
}

// ─── SWAP MODAL ───────────────────────────────────────────────────────────────
function renderSwap() {
  const {di,ei}=S.swapModal;
  const d=days()[di]; const ex=d.exercises[ei]; const color=d.color;
  const alts=ALTS[ex.name]||[];

  const altHtml=alts.map((a,i)=>`
    <div class="alt-card" data-i="${i}" style="background:#111;border:1px solid #2a2a2a;border-radius:2px;padding:14px 16px;cursor:pointer;margin-bottom:8px;transition:border-color .15s">
      <div style="display:flex;justify-content:space-between;align-items:flex-start;gap:12px">
        <div>
          <div style="font-size:14px;color:#f0ede6;margin-bottom:4px">${a.name}</div>
          <div style="font-size:11px;color:#666;font-style:italic">${a.notes}</div>
        </div>
        <div style="font-size:11px;color:${color};font-family:'Courier New',monospace;flex-shrink:0">${a.sets}×${a.reps}</div>
      </div>
    </div>`).join("");

  return `
  <div style="background:#0a0a0a;min-height:100vh">
    <div style="background:#111;border-bottom:1px solid #1e1e1e;padding:16px 20px;display:flex;align-items:center;gap:16px">
      <button id="closeSwap" style="background:none;border:none;color:#888;font-size:22px;padding:0;line-height:1">←</button>
      <div>
        <div style="font-size:10px;letter-spacing:4px;color:${color};text-transform:uppercase;font-family:'Courier New',monospace">Swap Exercise</div>
        <div style="font-size:17px;font-weight:800">${ex.name}</div>
      </div>
    </div>
    <div style="max-width:600px;margin:0 auto;padding:24px 16px">
      ${alts.length?`<div style="font-size:10px;letter-spacing:4px;color:#444;text-transform:uppercase;font-family:'Courier New',monospace;margin-bottom:14px">Suggested Alternatives</div>${altHtml}<div style="height:1px;background:#1e1e1e;margin:24px 0"></div>`:""}

      <div style="font-size:10px;letter-spacing:4px;color:#444;text-transform:uppercase;font-family:'Courier New',monospace;margin-bottom:14px">Custom Exercise</div>
      <div style="background:#111;border:1px solid #2a2a2a;border-radius:2px;padding:16px;display:flex;flex-direction:column;gap:10px">
        <div>
          <div style="font-size:9px;color:#555;letter-spacing:2px;text-transform:uppercase;font-family:'Courier New',monospace;margin-bottom:6px">Exercise Name</div>
          <input id="cName" type="text" placeholder="${ex.name}" style="background:#0a0a0a;border:1px solid #2a2a2a;border-radius:2px;color:#f0ede6;padding:10px;font-size:14px;width:100%;font-family:Georgia,serif;outline:none">
        </div>
        <div style="display:grid;grid-template-columns:1fr 1fr;gap:10px">
          <div>
            <div style="font-size:9px;color:#555;letter-spacing:2px;text-transform:uppercase;font-family:'Courier New',monospace;margin-bottom:6px">Sets</div>
            <input id="cSets" type="number" placeholder="${ex.sets}" style="background:#0a0a0a;border:1px solid #2a2a2a;border-radius:2px;color:#f0ede6;padding:10px;font-size:14px;width:100%;font-family:'Courier New',monospace;outline:none">
          </div>
          <div>
            <div style="font-size:9px;color:#555;letter-spacing:2px;text-transform:uppercase;font-family:'Courier New',monospace;margin-bottom:6px">Reps / Duration</div>
            <input id="cReps" type="text" placeholder="${ex.reps}" style="background:#0a0a0a;border:1px solid #2a2a2a;border-radius:2px;color:#f0ede6;padding:10px;font-size:14px;width:100%;font-family:'Courier New',monospace;outline:none">
          </div>
        </div>
        <div>
          <div style="font-size:9px;color:#555;letter-spacing:2px;text-transform:uppercase;font-family:'Courier New',monospace;margin-bottom:6px">Coaching Note (optional)</div>
          <input id="cNotes" type="text" placeholder="${ex.notes}" style="background:#0a0a0a;border:1px solid #2a2a2a;border-radius:2px;color:#f0ede6;padding:10px;font-size:14px;width:100%;font-family:Georgia,serif;outline:none;font-style:italic">
        </div>
        <button id="saveCustom" style="background:${color};border:none;color:#000;padding:12px;border-radius:2px;font-size:11px;font-family:'Courier New',monospace;letter-spacing:2px;font-weight:800;margin-top:4px">SAVE CUSTOM EXERCISE</button>
      </div>
      <button id="keepOrig" style="width:100%;background:transparent;border:1px solid #1e1e1e;color:#444;padding:12px;border-radius:2px;font-size:11px;font-family:'Courier New',monospace;letter-spacing:2px;margin-top:10px">KEEP ORIGINAL</button>
    </div>
  </div>`;
}

// ─── TRACKING ─────────────────────────────────────────────────────────────────
function renderTracking() {
  const {di,ei,date}=S.tracking;
  const dd=days(); const td=dd[di]; const ex=td.exercises[ei];
  const key=`${td.label}|${date}`;
  const exLog=((S.logs[key]||{})[ex.name])||{};
  const allKeys=Object.keys(S.logs).filter(k=>k.startsWith(td.label+"|")&&k!==key).sort().reverse();
  const prevKey=allKeys[0];
  const prevLog=prevKey?((S.logs[prevKey]||{})[ex.name]||{}):null;
  const hasPrev=prevLog&&Object.values(prevLog).some(s=>s.weight||s.reps);
  const pct=((ei+1)/td.exercises.length*100).toFixed(1);

  let sHtml="";
  for(let i=0;i<ex.sets;i++){
    const s=exLog[i]||{}; const done=s.done;
    const wPh=hasPrev?(prevLog[i]?.weight||"0"):"0";
    const rPh=hasPrev?(prevLog[i]?.reps||String(ex.reps).split("–")[0]):String(ex.reps).split("–")[0];
    sHtml+=`<div style="display:grid;grid-template-columns:36px 1fr 1fr 44px;gap:8px;align-items:center;border:1px solid ${done?td.color+"55":"#1e1e1e"};background:${done?td.color+"1a":"#111"};border-radius:2px;padding:10px;transition:all .2s">
      <div style="font-family:'Courier New',monospace;font-size:12px;color:${done?td.color:"#555"};font-weight:700">S${i+1}</div>
      <input type="number" inputmode="decimal" placeholder="${wPh}" value="${s.weight||""}" data-field="weight" data-set="${i}" style="background:#0a0a0a;border:1px solid #2a2a2a;border-radius:2px;color:#f0ede6;padding:10px;font-size:16px;width:100%;font-family:'Courier New',monospace;outline:none;box-sizing:border-box">
      <input type="number" inputmode="numeric" placeholder="${rPh}" value="${s.reps||""}" data-field="reps" data-set="${i}" style="background:#0a0a0a;border:1px solid #2a2a2a;border-radius:2px;color:#f0ede6;padding:10px;font-size:16px;width:100%;font-family:'Courier New',monospace;outline:none;box-sizing:border-box">
      <button class="dbtn" data-set="${i}" style="background:${done?td.color:"transparent"};border:1px solid ${done?td.color:"#333"};border-radius:2px;color:${done?"#000":"#444"};font-size:16px;padding:10px 0;line-height:1;width:100%;transition:all .2s">✓</button>
    </div>`;
  }

  let prevHtml="";
  if(hasPrev){
    let chips="";
    for(let i=0;i<ex.sets;i++){const s=prevLog[i]||{};if(s.weight||s.reps)chips+=`<div style="background:#141414;border:1px solid #222;border-radius:2px;padding:5px 10px;font-size:12px;font-family:'Courier New',monospace;color:#555">S${i+1}: ${s.weight?s.weight+"kg":"—"} × ${s.reps||"—"}</div>`;}
    prevHtml=`<div style="background:#0d0d0d;border:1px solid #1a1a1a;border-radius:2px;padding:12px 16px;margin-bottom:16px"><div style="font-size:10px;letter-spacing:3px;color:#444;text-transform:uppercase;font-family:'Courier New',monospace;margin-bottom:8px">Last time (${prevKey.split("|")[1]})</div><div style="display:flex;gap:6px;flex-wrap:wrap">${chips}</div></div>`;
  }

  const prevBtn=ei>0?`<button id="prevEx" style="flex:0.5;background:#111;border:1px solid #2a2a2a;color:#888;padding:14px;border-radius:2px;font-size:12px;font-family:'Courier New',monospace;letter-spacing:2px">← PREV</button>`:"";
  const isLast=ei>=td.exercises.length-1;
  const nextLabel=isLast?"✓ FINISH WORKOUT":`NEXT → ${td.exercises[ei+1].name.split(" ")[0]}`;
  const nextId=isLast?"finishEx":"nextEx";

  return `
  <div style="background:#0a0a0a;min-height:100vh">
    <div style="background:#111;border-bottom:1px solid #1e1e1e;padding:16px 20px;display:flex;align-items:center;gap:16px">
      <button id="backBtn" style="background:none;border:none;color:#888;font-size:22px;padding:0;line-height:1">←</button>
      <div style="flex:1">
        <div style="font-size:10px;letter-spacing:4px;color:${td.color};text-transform:uppercase;font-family:'Courier New',monospace">${td.day} · ${date}</div>
        <div style="font-size:17px;font-weight:800">${ex.name}</div>
      </div>
      <div style="font-size:11px;color:#444;font-family:'Courier New',monospace">${ei+1}/${td.exercises.length}</div>
    </div>
    <div style="height:2px;background:#1a1a1a"><div style="height:2px;background:${td.color};width:${pct}%;transition:width .3s"></div></div>
    <div style="max-width:600px;margin:0 auto;padding:20px 16px">
      <div style="background:#111;border:1px solid ${td.color}33;border-radius:2px;padding:14px 16px;margin-bottom:16px;display:flex;gap:20px;align-items:flex-start">
        <div style="text-align:center;min-width:52px"><div style="font-size:9px;color:#555;letter-spacing:3px;font-family:'Courier New',monospace;text-transform:uppercase">Sets</div><div style="font-size:24px;font-weight:900;color:${td.color}">${ex.sets}</div></div>
        <div style="text-align:center;min-width:52px"><div style="font-size:9px;color:#555;letter-spacing:3px;font-family:'Courier New',monospace;text-transform:uppercase">Reps</div><div style="font-size:24px;font-weight:900;color:${td.color}">${ex.reps}</div></div>
        <div style="flex:1"><div style="font-size:9px;color:#555;letter-spacing:2px;font-family:'Courier New',monospace;text-transform:uppercase;margin-bottom:4px">Tip</div><div style="font-size:12px;color:#777;font-style:italic;line-height:1.4">${ex.notes}</div></div>
      </div>
      ${prevHtml}
      <div style="display:flex;flex-direction:column;gap:6px">
        <div style="display:grid;grid-template-columns:36px 1fr 1fr 44px;gap:8px;padding:0 2px 4px">
          <div style="font-size:9px;color:#444;font-family:'Courier New',monospace;letter-spacing:2px;text-transform:uppercase">SET</div>
          <div style="font-size:9px;color:#444;font-family:'Courier New',monospace;letter-spacing:2px;text-transform:uppercase">WEIGHT</div>
          <div style="font-size:9px;color:#444;font-family:'Courier New',monospace;letter-spacing:2px;text-transform:uppercase">REPS</div>
          <div></div>
        </div>
        ${sHtml}
      </div>
      <div style="display:flex;gap:8px;margin-top:24px">${prevBtn}<button id="${nextId}" style="flex:2;background:${td.color};border:none;color:#000;padding:14px;border-radius:2px;font-size:12px;font-family:'Courier New',monospace;letter-spacing:2px;font-weight:800">${nextLabel}</button></div>
    </div>
  </div>`;
}

// ─── MAIN ─────────────────────────────────────────────────────────────────────
function renderMain() {
  const tabs=["program","history","nutrition","recovery","progression"];
  const tabsHtml=tabs.map(t=>`<button class="tbtn" data-t="${t}" style="background:${S.tab===t?"#f0ede6":"transparent"};color:${S.tab===t?"#0a0a0a":"#666"};border:1px solid ${S.tab===t?"#f0ede6":"#333"};padding:7px 14px;border-radius:2px;font-size:10px;letter-spacing:3px;text-transform:uppercase;font-family:'Courier New',monospace;transition:all .2s">${t}</button>`).join("");
  let content="";
  if(S.tab==="program") content=renderProg();
  else if(S.tab==="history") content=renderHist();
  else if(S.tab==="nutrition") content=renderInfo(NUTRITION,"Nutrition Blueprint","Food is the other half of the program");
  else if(S.tab==="recovery") content=renderInfo(RECOVERY,"Recovery Protocol","Growth happens outside the gym");
  else if(S.tab==="progression") content=renderProgression();
  return `
  <div style="background:#0a0a0a;min-height:100vh">
    <div style="background:linear-gradient(135deg,#1a1a1a 0%,#111 100%);border-bottom:1px solid #222;padding:28px 24px 20px;text-align:center">
      <div style="font-size:10px;letter-spacing:6px;color:#888;text-transform:uppercase;margin-bottom:6px;font-family:'Courier New',monospace">Sculpt & Strengthen</div>
      <h1 style="font-size:clamp(26px,6vw,44px);font-weight:900;margin:0 0 4px;letter-spacing:-1px;color:#f0ede6">BUILD THE PHYSIQUE</h1>
      <p style="color:#666;margin:6px 0 0;font-size:13px;font-family:'Courier New',monospace">4-Day Split · Legs 2x/Week · 12 Weeks · Intermediate</p>
      <div style="display:flex;gap:8px;justify-content:center;margin-top:18px;flex-wrap:wrap">${tabsHtml}</div>
    </div>
    <div style="max-width:800px;margin:0 auto;padding:24px 16px">${content}</div>
  </div>`;
}

function renderProg() {
  const dd=days(); const d=dd[S.day]; const t=today(); const sKey=`${d.label}|${t}`; const sLog=S.logs[sKey]||{};
  const logged=d.exercises.filter(ex=>Object.values(sLog[ex.name]||{}).some(s=>s.weight||s.reps)).length;
  const isCustom=!!S.custom;

  const schedHtml=SCHEDULE.map(s=>`<div style="background:${s.color==="#333"?"#0f0f0f":"#111"};border:1px solid ${s.color==="#333"?"#1a1a1a":s.color+"44"};border-radius:2px;padding:8px 4px;text-align:center"><div style="font-size:9px;font-family:'Courier New',monospace;color:${s.color==="#333"?"#333":s.color};letter-spacing:1px;margin-bottom:4px">${s.day}</div><div style="font-size:8px;color:${s.color==="#333"?"#2a2a2a":"#555"};line-height:1.3">${s.label.split(" — ")[0]}</div></div>`).join("");
  const dayTabsHtml=dd.map((d2,i)=>`<button class="dtab" data-i="${i}" style="flex-shrink:0;background:${S.day===i?d2.color:"#1a1a1a"};color:${S.day===i?"#0a0a0a":"#666"};border:1px solid ${S.day===i?d2.color:"#2a2a2a"};padding:8px 12px;border-radius:2px;font-size:11px;font-family:'Courier New',monospace;transition:all .2s;font-weight:${S.day===i?"700":"400"}">${d2.day.slice(0,3).toUpperCase()}</button>`).join("");

  const exHtml=d.exercises.map((ex,i)=>{
    const exLog=sLog[ex.name]||{};
    const done=Object.values(exLog).filter(s=>s.done).length;
    const has=Object.values(exLog).some(s=>s.weight||s.reps);
    const isMod=isCustom&&DEFAULT_DAYS[S.day]?.exercises[i]?.name!==ex.name;
    return `<div style="display:flex;gap:2px;margin-bottom:2px">
      <div class="exrow" data-i="${i}" style="flex:1;background:${has?d.color+"0d":"#0f0f0f"};border:1px solid ${has?d.color+"33":"#1a1a1a"};border-radius:2px;cursor:${S.editMode?"default":"pointer"};transition:all .15s">
        <div style="display:grid;grid-template-columns:1fr 50px 80px 72px;padding:13px 16px;align-items:center">
          <div style="display:flex;align-items:center;gap:10px">
            <span style="width:18px;height:18px;border-radius:50%;background:${d.color}22;border:1px solid ${d.color}44;display:flex;align-items:center;justify-content:center;font-size:9px;color:${d.color};flex-shrink:0;font-family:'Courier New',monospace">${i+1}</span>
            <div style="font-size:14px;color:#d0c8b8">${ex.name}${isMod?` <span style="font-size:9px;color:${d.color};font-family:'Courier New',monospace;letter-spacing:1px;vertical-align:middle">CUSTOM</span>`:""}</div>
          </div>
          <div style="text-align:center;font-family:'Courier New',monospace;color:#555;font-size:13px">${ex.sets}</div>
          <div style="text-align:center;font-family:'Courier New',monospace;color:#555;font-size:12px">${ex.reps}</div>
          <div style="text-align:center">${has?`<span style="font-size:11px;font-family:'Courier New',monospace;color:${d.color}">${done}/${ex.sets} ✓</span>`:`<span style="font-size:11px;color:#2a2a2a;font-family:'Courier New',monospace">—</span>`}</div>
        </div>
      </div>
      ${S.editMode?`<button class="swapbtn" data-i="${i}" style="background:#1a1a1a;border:1px solid #2a2a2a;color:#888;padding:0 14px;border-radius:2px;font-size:11px;font-family:'Courier New',monospace;flex-shrink:0;white-space:nowrap">⇄ swap</button>`:""}
    </div>`;
  }).join("");

  return `
    <div style="margin-bottom:24px">
      <div style="font-size:10px;letter-spacing:4px;color:#444;text-transform:uppercase;font-family:'Courier New',monospace;margin-bottom:10px">Weekly Schedule</div>
      <div style="display:grid;grid-template-columns:repeat(7,1fr);gap:4px">${schedHtml}</div>
    </div>
    <div style="display:flex;gap:6px;margin-bottom:20px;overflow-x:auto;padding-bottom:4px">${dayTabsHtml}</div>
    <div style="border-left:3px solid ${d.color};padding-left:16px;margin-bottom:20px;display:flex;justify-content:space-between;align-items:flex-start;gap:10px">
      <div>
        <div style="font-size:10px;color:${d.color};letter-spacing:4px;text-transform:uppercase;font-family:'Courier New',monospace;margin-bottom:2px">${d.day}</div>
        <h2 style="font-size:20px;margin:0;font-weight:800;color:#f0ede6">${d.label}</h2>
        <div style="color:#555;font-size:12px;margin-top:2px;font-family:'Courier New',monospace">${logged>0?`${logged}/${d.exercises.length} logged today`:`${d.exercises.length} exercises`}</div>
      </div>
      <div style="display:flex;gap:8px;flex-shrink:0;flex-wrap:wrap;justify-content:flex-end">
        <button id="editToggle" style="background:${S.editMode?"#f0ede6":"transparent"};color:${S.editMode?"#0a0a0a":"#666"};border:1px solid ${S.editMode?"#f0ede6":"#444"};padding:8px 14px;border-radius:2px;font-size:10px;font-family:'Courier New',monospace;letter-spacing:2px">${S.editMode?"✓ DONE EDITING":"✏ EDIT"}</button>
        <button id="startBtn" style="background:${d.color};border:none;color:#000;padding:10px 18px;border-radius:2px;font-size:11px;font-family:'Courier New',monospace;letter-spacing:2px;font-weight:800">▶ START</button>
      </div>
    </div>
    ${S.editMode&&isCustom?`<div style="display:flex;justify-content:flex-end;margin-bottom:12px"><button id="resetBtn" style="background:transparent;border:1px solid #333;color:#555;padding:6px 14px;border-radius:2px;font-size:10px;font-family:'Courier New',monospace;letter-spacing:2px">↺ RESET TO DEFAULTS</button></div>`:""}
    <div>
      <div style="display:grid;grid-template-columns:1fr 50px 80px 72px;padding:6px 16px;font-size:9px;letter-spacing:3px;color:#444;text-transform:uppercase;font-family:'Courier New',monospace;margin-bottom:2px">
        <span>Exercise</span><span style="text-align:center">Sets</span><span style="text-align:center">Reps</span><span style="text-align:center">Today</span>
      </div>
      ${exHtml}
    </div>`;
}

function renderHist() {
  const keys=Object.keys(S.logs).sort().reverse();
  let html=`<h2 style="font-size:24px;margin:0 0 4px;font-weight:800;color:#f0ede6">Workout History</h2><p style="margin:0 0 24px;color:#555;font-size:13px;font-family:'Courier New',monospace">Every session saved in your browser</p>`;
  if(!keys.length) return html+`<div style="text-align:center;padding:48px 24px;color:#333;font-family:'Courier New',monospace;font-size:13px;line-height:2">No sessions yet.<br>Hit ▶ START on any day to begin.</div>`;
  keys.forEach(key=>{
    const [label,date]=key.split("|");
    const dayD=days().find(d=>d.label===label); const color=dayD?.color||"#888";
    const sess=S.logs[key];
    const exNames=Object.keys(sess).filter(n=>Object.values(sess[n]).some(s=>s.weight||s.reps));
    if(!exNames.length) return;
    const exHtml=exNames.map(n=>{
      const entries=Object.entries(sess[n]).filter(([,s])=>s.weight||s.reps);
      const chips=entries.map(([si,s])=>`<div style="background:${s.done?color+"22":"#1a1a1a"};border:1px solid ${s.done?color+"44":"#222"};border-radius:2px;padding:5px 10px;font-size:12px;font-family:'Courier New',monospace;color:${s.done?color:"#555"}">S${parseInt(si)+1}: ${s.weight?s.weight+"kg":"—"} × ${s.reps||"—"}</div>`).join("");
      return `<div style="margin-bottom:12px"><div style="font-size:11px;color:#666;margin-bottom:6px;font-family:'Courier New',monospace;letter-spacing:1px">${n}</div><div style="display:flex;gap:6px;flex-wrap:wrap">${chips}</div></div>`;
    }).join("");
    html+=`<div style="background:#111;border:1px solid ${color}33;border-radius:2px;overflow:hidden;margin-bottom:16px"><div style="background:${color}18;padding:12px 16px;border-bottom:1px solid ${color}22;display:flex;justify-content:space-between;align-items:center"><div><div style="font-size:10px;color:${color};letter-spacing:3px;text-transform:uppercase;font-family:'Courier New',monospace">${date}</div><div style="font-size:15px;font-weight:700">${label}</div></div><div style="font-size:11px;color:#555;font-family:'Courier New',monospace">${exNames.length} exercises</div></div><div style="padding:14px 16px">${exHtml}</div></div>`;
  });
  return html;
}

function renderInfo(items,title,sub) {
  const cards=items.map(n=>`<div style="background:#111;border:1px solid #1e1e1e;border-radius:2px;padding:16px 20px;display:flex;gap:16px;align-items:flex-start;margin-bottom:12px"><span style="font-size:20px;flex-shrink:0;padding-top:2px">${n.icon}</span><div><div style="font-size:12px;letter-spacing:3px;color:#888;text-transform:uppercase;font-family:'Courier New',monospace;margin-bottom:6px">${n.title}</div><div style="font-size:14px;color:#bbb;line-height:1.6">${n.text}</div></div></div>`).join("");
  let extra="";
  if(title.includes("Nutrition")){const meals=MEALS.map(([m,f],i,a)=>`<div style="padding-bottom:12px;margin-bottom:12px;border-bottom:${i<a.length-1?"1px solid #1a1a1a":"none"}"><div style="font-size:10px;color:#555;font-family:'Courier New',monospace;letter-spacing:1px">${m}</div><div style="font-size:14px;color:#ddd;margin-top:3px">${f}</div></div>`).join("");extra=`<div style="margin-top:24px;background:#111;border:1px solid #222;border-radius:2px;padding:20px"><div style="font-size:11px;letter-spacing:4px;color:#666;text-transform:uppercase;font-family:'Courier New',monospace;margin-bottom:14px">Sample Day of Eating</div>${meals}</div>`;}
  return `<h2 style="font-size:24px;margin:0 0 4px;font-weight:800;color:#f0ede6">${title}</h2><p style="margin:0 0 24px;color:#555;font-size:13px;font-family:'Courier New',monospace">${sub}</p>${cards}${extra}`;
}

function renderProgression() {
  const rules=PROGRESSION.map((p,i)=>`<div style="display:flex;gap:16px;align-items:flex-start;background:#111;border:1px solid #1e1e1e;border-radius:2px;padding:16px 20px;margin-bottom:8px"><div style="font-family:'Courier New',monospace;font-size:13px;color:#555;flex-shrink:0">0${i+1}</div><div style="font-size:15px;color:#d0c8b8;line-height:1.5">${p}</div></div>`).join("");
  const per=PERIODIZATION.map(([w,ph,d])=>`<div style="border-left:2px solid #2a2a2a;padding-left:16px;padding-bottom:14px"><div style="display:flex;gap:12px;align-items:center;margin-bottom:4px"><span style="font-size:11px;color:#555;font-family:'Courier New',monospace">${w}</span><span style="font-size:11px;letter-spacing:2px;color:#777;text-transform:uppercase;font-family:'Courier New',monospace">${ph}</span></div><div style="font-size:14px;color:#bbb;line-height:1.5">${d}</div></div>`).join("");
  return `<h2 style="font-size:24px;margin:0 0 4px;font-weight:800;color:#f0ede6">Progressive Overload</h2><p style="margin:0 0 24px;color:#555;font-size:13px;font-family:'Courier New',monospace">The only rule that matters</p>${rules}<div style="margin-top:24px;background:#111;border:1px solid #2a2a2a;border-radius:2px;padding:20px"><div style="font-size:11px;letter-spacing:4px;color:#666;text-transform:uppercase;font-family:'Courier New',monospace;margin-bottom:16px">12-Week Periodization</div>${per}</div>`;
}

// ─── BIND ─────────────────────────────────────────────────────────────────────
function bind() {
  document.querySelectorAll(".tbtn").forEach(b=>b.addEventListener("click",()=>{S.tab=b.dataset.t;render();}));
  document.querySelectorAll(".dtab").forEach(b=>b.addEventListener("click",()=>{S.day=parseInt(b.dataset.i);render();}));

  const et=document.getElementById("editToggle");
  if(et) et.addEventListener("click",()=>{S.editMode=!S.editMode;render();});

  const rb=document.getElementById("resetBtn");
  if(rb) rb.addEventListener("click",()=>{if(confirm("Reset all exercises to defaults?")) {resetCustom();render();}});

  const sb=document.getElementById("startBtn");
  if(sb) sb.addEventListener("click",()=>{S.tracking={di:S.day,ei:0,date:today()};S.editMode=false;render();});

  document.querySelectorAll(".exrow").forEach(r=>{
    r.addEventListener("click",()=>{if(!S.editMode){S.tracking={di:S.day,ei:parseInt(r.dataset.i),date:today()};render();}});
  });

  document.querySelectorAll(".swapbtn").forEach(b=>{
    b.addEventListener("click",()=>{S.swapModal={di:S.day,ei:parseInt(b.dataset.i)};render();});
  });

  // Swap modal
  const cs=document.getElementById("closeSwap");
  if(cs) cs.addEventListener("click",()=>{S.swapModal=null;render();});
  const ko=document.getElementById("keepOrig");
  if(ko) ko.addEventListener("click",()=>{S.swapModal=null;render();});

  document.querySelectorAll(".alt-card").forEach(c=>{
    c.addEventListener("mouseenter",()=>c.style.borderColor="#555");
    c.addEventListener("mouseleave",()=>c.style.borderColor="#2a2a2a");
    c.addEventListener("click",()=>{
      const {di,ei}=S.swapModal;
      const alts=ALTS[days()[di].exercises[ei].name]||[];
      swapEx(di,ei,alts[parseInt(c.dataset.i)]);
    });
  });

  const sc=document.getElementById("saveCustom");
  if(sc) sc.addEventListener("click",()=>{
    const {di,ei}=S.swapModal; const orig=days()[di].exercises[ei];
    const name=document.getElementById("cName").value.trim()||orig.name;
    const sets=parseInt(document.getElementById("cSets").value)||orig.sets;
    const reps=document.getElementById("cReps").value.trim()||orig.reps;
    const notes=document.getElementById("cNotes").value.trim()||orig.notes;
    swapEx(di,ei,{name,sets,reps,notes});
  });

  // Tracking
  const bb=document.getElementById("backBtn");
  if(bb) bb.addEventListener("click",()=>{S.tracking=null;render();});

  if(S.tracking){
    const {di,ei,date}=S.tracking; const td=days()[di]; const ex=td.exercises[ei];
    document.querySelectorAll("input[data-field]").forEach(inp=>{
      inp.addEventListener("change",()=>setLog(td.label,date,ex.name,parseInt(inp.dataset.set),inp.dataset.field,inp.value));
    });
    document.querySelectorAll(".dbtn").forEach(btn=>{
      btn.addEventListener("click",()=>{
        const i=parseInt(btn.dataset.set); const k=`${td.label}|${date}`;
        const cur=((S.logs[k]||{})[ex.name]||{})[i]||{};
        setLog(td.label,date,ex.name,i,"done",!cur.done); render();
      });
    });
    const pe=document.getElementById("prevEx"); if(pe) pe.addEventListener("click",()=>{S.tracking.ei--;render();});
    const ne=document.getElementById("nextEx"); if(ne) ne.addEventListener("click",()=>{S.tracking.ei++;render();});
    const fe=document.getElementById("finishEx"); if(fe) fe.addEventListener("click",()=>{S.tracking=null;render();});
  }
}

load(); render();
</script>
</body>
</html>
