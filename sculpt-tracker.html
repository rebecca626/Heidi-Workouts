<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sculpt & Strengthen</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { background: #0a0a0a; color: #f0ede6; font-family: Georgia, serif; min-height: 100vh; }
button { cursor: pointer; }
input[type=number] { -moz-appearance: textfield; }
input[type=number]::-webkit-outer-spin-button,
input[type=number]::-webkit-inner-spin-button { -webkit-appearance: none; }
</style>
</head>
<body>
<div id="app"></div>
<script>
const program = {
  schedule: [
    { day: "MON", label: "Lower — Quad Focus", color: "#4ae87a" },
    { day: "TUE", label: "Upper — Push + Pull", color: "#e8534a" },
    { day: "WED", label: "Rest", color: "#333" },
    { day: "THU", label: "Lower — Glute + Ham", color: "#b44ae8" },
    { day: "FRI", label: "Upper — Back + Arms", color: "#4a8fe8" },
    { day: "SAT", label: "Rest", color: "#333" },
    { day: "SUN", label: "Rest", color: "#333" },
  ],
  days: [
    {
      day: "Monday", label: "Lower — Quad Focus", color: "#4ae87a",
      exercises: [
        { name: "Leg Press", sets: 4, reps: "8–10", notes: "Feet shoulder-width, high foot placement, full range" },
        { name: "Romanian Deadlift", sets: 3, reps: "10", notes: "Hinge at hips, feel the hamstring stretch" },
        { name: "Leg Press (Close Stance)", sets: 3, reps: "12", notes: "Feet low and narrow for inner quad focus" },
        { name: "Walking Lunges", sets: 3, reps: "12 each", notes: "Dumbbells, long stride" },
        { name: "Leg Extension Machine", sets: 3, reps: "15", notes: "Squeeze at top, slow lower" },
        { name: "Standing Calf Raise", sets: 4, reps: "20", notes: "Full range of motion" },
      ],
    },
    {
      day: "Tuesday", label: "Upper — Push + Pull", color: "#e8534a",
      exercises: [
        { name: "Dumbbell Bench Press", sets: 4, reps: "8–10", notes: "Moderate weight, full range" },
        { name: "Cable Row (Seated)", sets: 4, reps: "10", notes: "Neutral grip, retract shoulder blades" },
        { name: "Dumbbell Shoulder Press", sets: 3, reps: "10–12", notes: "Seated, controlled" },
        { name: "Lat Pulldown", sets: 3, reps: "12", notes: "Wide grip, pull to collarbone" },
        { name: "Lateral Raises", sets: 3, reps: "15", notes: "Light weight, strict form" },
        { name: "Cable Tricep Pushdown", sets: 3, reps: "15", notes: "Rope attachment" },
      ],
    },
    {
      day: "Thursday", label: "Lower — Glute + Ham", color: "#b44ae8",
      exercises: [
        { name: "Barbell Hip Thrust", sets: 4, reps: "10–12", notes: "Squeeze glutes hard at top, 1s hold" },
        { name: "Sumo Deadlift", sets: 4, reps: "6–8", notes: "Wide stance, drives glutes and inner thigh" },
        { name: "Bulgarian Split Squat", sets: 3, reps: "10 each", notes: "Rear foot elevated, dumbbells" },
        { name: "Lying Leg Curl Machine", sets: 3, reps: "12–15", notes: "Slow, controlled eccentric" },
        { name: "Cable Kickback", sets: 3, reps: "15 each", notes: "Full glute extension" },
        { name: "Seated Calf Raise", sets: 4, reps: "20", notes: "Soleus focus" },
      ],
    },
    {
      day: "Friday", label: "Upper — Back + Arms", color: "#4a8fe8",
      exercises: [
        { name: "Pull-Ups or Assisted", sets: 4, reps: "6–10", notes: "Full hang to chin over bar" },
        { name: "Incline Dumbbell Press", sets: 3, reps: "10", notes: "30° incline, upper chest focus" },
        { name: "Single-Arm Dumbbell Row", sets: 3, reps: "10 each", notes: "Heavy, elbow drives back" },
        { name: "Face Pulls (Cable)", sets: 3, reps: "15", notes: "Rope at eye level, rear delts" },
        { name: "Dumbbell Bicep Curl", sets: 3, reps: "12", notes: "Alternating, supinate at top" },
        { name: "Plank + Dead Bug", sets: 3, reps: "30–45s", notes: "Core finisher" },
      ],
    },
  ],
  nutrition: [
    { icon: "🥩", title: "Protein", text: "0.8–1g per lb of bodyweight. Chicken, eggs, lean beef, fish, Greek yogurt. Non-negotiable for muscle growth." },
    { icon: "🍚", title: "Carbs", text: "Fuel your training. Rice, oats, fruit, potatoes around workouts. Muscle needs glycogen — don't fear carbs." },
    { icon: "🥑", title: "Fats", text: "0.3–0.5g per lb. Eggs, olive oil, nuts, avocado. Support hormones and recovery." },
    { icon: "📊", title: "Calories", text: "Slight surplus (200–300 kcal) if building muscle. Maintain or small deficit if leaning out. Consistency is everything." },
    { icon: "💧", title: "Hydration", text: "3–4L water daily. Muscles are 75% water. Electrolytes if sweating heavily." },
  ],
  recovery: [
    { icon: "😴", title: "Sleep", text: "7–9 hours. This is when muscle is actually built. Non-negotiable." },
    { icon: "🧘", title: "Deload", text: "Every 8 weeks, drop volume and intensity by 40% for a week. Prevents burnout, drives supercompensation." },
    { icon: "🚶", title: "Cardio", text: "2x/week optional light cardio — walking or cycling 20–30 min. Keeps conditioning without eating muscle." },
    { icon: "💆", title: "Recovery Tools", text: "Foam roll and stretch post-session. Focus on hips, hamstrings, quads. Heat or sauna 2x/week if available." },
  ],
  progression: [
    "Add weight when you hit the top of the rep range for all sets",
    "Track every session — numbers don't lie",
    "Progressive overload is the only mechanism of muscle growth",
    "If a lift stalls for 2+ weeks, rotate the variation or technique",
    "Mind-muscle connection over ego lifting — feel the target muscle working",
  ],
  periodization: [
    ["Weeks 1–3","Accumulation","Higher volume, moderate weight. Learn movements, nail technique, build work capacity."],
    ["Weeks 4–6","Intensification","Increase load 5–10%. Drop 1 set per exercise. Go heavier and push harder."],
    ["Weeks 7–9","Peak Overload","Max effort. Push every working set close to failure. This is where growth happens."],
    ["Week 10","Deload","Drop volume 40%. Same exercises, lighter weight. Let the adaptations absorb."],
    ["Weeks 11–12","Re-accumulation","Restart the cycle at higher baseline weights. You're stronger now."],
  ],
  meals: [
    ["Meal 1 — Pre-Train","4 eggs + oats + banana + black coffee"],
    ["Meal 2 — Post-Train","200g chicken breast + 300g rice + greens"],
    ["Meal 3 — Midday","Greek yogurt + berries + handful almonds"],
    ["Meal 4 — Dinner","Salmon + sweet potato + olive oil + broccoli"],
    ["Meal 5 — Before Bed","Cottage cheese or casein shake + milk"],
  ],
};

// ─── State ───────────────────────────────────────────────────────────────────
let state = {
  activeTab: "program",
  activeDay: 0,
  tracking: null, // { dayIdx, exIdx, date }
  logs: {},
};

function todayStr() { return new Date().toISOString().slice(0, 10); }

function loadLogs() {
  try { state.logs = JSON.parse(localStorage.getItem("sculpt-v2") || "{}"); } catch {}
}

function saveLogs() {
  try { localStorage.setItem("sculpt-v2", JSON.stringify(state.logs)); } catch {}
}

function setLog(dayLabel, date, exName, setIdx, field, value) {
  const key = `${dayLabel}|${date}`;
  if (!state.logs[key]) state.logs[key] = {};
  if (!state.logs[key][exName]) state.logs[key][exName] = {};
  if (!state.logs[key][exName][setIdx]) state.logs[key][exName][setIdx] = {};
  state.logs[key][exName][setIdx][field] = value;
  saveLogs();
}

// ─── Render ───────────────────────────────────────────────────────────────────
function render() {
  const app = document.getElementById("app");
  if (state.tracking) {
    app.innerHTML = renderTracking();
  } else {
    app.innerHTML = renderMain();
  }
  attachEvents();
}

// ─── TRACKING SCREEN ─────────────────────────────────────────────────────────
function renderTracking() {
  const { dayIdx, exIdx, date } = state.tracking;
  const tDay = program.days[dayIdx];
  const ex = tDay.exercises[exIdx];
  const tKey = `${tDay.label}|${date}`;
  const exLog = ((state.logs[tKey] || {})[ex.name]) || {};

  const allKeys = Object.keys(state.logs).filter(k => k.startsWith(tDay.label + "|") && k !== tKey).sort().reverse();
  const prevKey = allKeys[0];
  const prevExLog = prevKey ? ((state.logs[prevKey] || {})[ex.name] || {}) : null;
  const hasPrev = prevExLog && Object.values(prevExLog).some(s => s.weight || s.reps);

  const progress = ((exIdx + 1) / tDay.exercises.length * 100).toFixed(1);

  let setsHtml = "";
  for (let i = 0; i < ex.sets; i++) {
    const s = exLog[i] || {};
    const done = s.done;
    const wPh = hasPrev ? (prevExLog[i]?.weight || "0") : "0";
    const rPh = hasPrev ? (prevExLog[i]?.reps || ex.reps.split("–")[0]) : ex.reps.split("–")[0];
    setsHtml += `
      <div class="set-row ${done ? "set-done" : ""}" style="border-color:${done ? tDay.color + "55" : "#1e1e1e"};background:${done ? tDay.color + "1a" : "#111"}">
        <div class="set-num" style="color:${done ? tDay.color : "#555"}">S${i+1}</div>
        <input type="number" inputmode="decimal" placeholder="${wPh}" value="${s.weight || ""}" data-field="weight" data-set="${i}" class="set-input" />
        <input type="number" inputmode="numeric" placeholder="${rPh}" value="${s.reps || ""}" data-field="reps" data-set="${i}" class="set-input" />
        <button class="done-btn ${done ? "done-btn-checked" : ""}" data-set="${i}" style="background:${done ? tDay.color : "transparent"};border-color:${done ? tDay.color : "#333"};color:${done ? "#000" : "#444"}">✓</button>
      </div>`;
  }

  let prevHtml = "";
  if (hasPrev) {
    let chips = "";
    for (let i = 0; i < ex.sets; i++) {
      const s = prevExLog[i] || {};
      if (s.weight || s.reps) chips += `<div class="prev-chip">S${i+1}: ${s.weight ? s.weight+"kg" : "—"} × ${s.reps || "—"}</div>`;
    }
    prevHtml = `<div class="prev-box"><div class="prev-label">Last time (${prevKey.split("|")[1]})</div><div class="chip-row">${chips}</div></div>`;
  }

  const prevBtn = exIdx > 0 ? `<button class="nav-btn secondary" id="prevEx">← PREV</button>` : "";
  const nextBtn = exIdx < tDay.exercises.length - 1
    ? `<button class="nav-btn primary" id="nextEx" style="background:${tDay.color}">NEXT → ${tDay.exercises[exIdx+1].name.split(" ")[0]}</button>`
    : `<button class="nav-btn primary" id="finishEx" style="background:${tDay.color}">✓ FINISH WORKOUT</button>`;

  return `
  <div style="background:#0a0a0a;min-height:100vh">
    <div style="background:#111;border-bottom:1px solid #1e1e1e;padding:16px 20px;display:flex;align-items:center;gap:16px">
      <button id="backBtn" style="background:none;border:none;color:#888;font-size:22px;padding:0;line-height:1;cursor:pointer">←</button>
      <div style="flex:1">
        <div style="font-size:10px;letter-spacing:4px;color:${tDay.color};text-transform:uppercase;font-family:'Courier New',monospace">${tDay.day} · ${date}</div>
        <div style="font-size:17px;font-weight:800">${ex.name}</div>
      </div>
      <div style="font-size:11px;color:#444;font-family:'Courier New',monospace">${exIdx+1}/${tDay.exercises.length}</div>
    </div>
    <div style="height:2px;background:#1a1a1a"><div style="height:2px;background:${tDay.color};width:${progress}%;transition:width .3s"></div></div>
    <div style="max-width:600px;margin:0 auto;padding:20px 16px">
      <div style="background:#111;border:1px solid ${tDay.color}33;border-radius:2px;padding:14px 16px;margin-bottom:16px;display:flex;gap:20px;align-items:flex-start">
        <div style="text-align:center;min-width:52px">
          <div style="font-size:9px;color:#555;letter-spacing:3px;font-family:'Courier New',monospace;text-transform:uppercase">Sets</div>
          <div style="font-size:24px;font-weight:900;color:${tDay.color}">${ex.sets}</div>
        </div>
        <div style="text-align:center;min-width:52px">
          <div style="font-size:9px;color:#555;letter-spacing:3px;font-family:'Courier New',monospace;text-transform:uppercase">Reps</div>
          <div style="font-size:24px;font-weight:900;color:${tDay.color}">${ex.reps}</div>
        </div>
        <div style="flex:1">
          <div style="font-size:9px;color:#555;letter-spacing:2px;font-family:'Courier New',monospace;text-transform:uppercase;margin-bottom:4px">Tip</div>
          <div style="font-size:12px;color:#777;font-style:italic;line-height:1.4">${ex.notes}</div>
        </div>
      </div>
      ${prevHtml}
      <div style="display:flex;flex-direction:column;gap:6px">
        <div style="display:grid;grid-template-columns:36px 1fr 1fr 44px;gap:8px;padding:0 2px 4px">
          <div class="col-hd">SET</div><div class="col-hd">WEIGHT (kg)</div><div class="col-hd">REPS</div><div class="col-hd"></div>
        </div>
        ${setsHtml}
      </div>
      <div style="display:flex;gap:8px;margin-top:24px">${prevBtn}${nextBtn}</div>
    </div>
  </div>
  <style>
    .col-hd{font-size:9px;color:#444;font-family:'Courier New',monospace;letter-spacing:2px;text-transform:uppercase}
    .set-row{display:grid;grid-template-columns:36px 1fr 1fr 44px;gap:8px;align-items:center;border:1px solid;border-radius:2px;padding:10px;transition:all .2s}
    .set-num{font-family:'Courier New',monospace;font-size:12px;font-weight:700}
    .set-input{background:#0a0a0a;border:1px solid #2a2a2a;border-radius:2px;color:#f0ede6;padding:10px;font-size:16px;width:100%;font-family:'Courier New',monospace;outline:none;box-sizing:border-box}
    .done-btn{border:1px solid;border-radius:2px;font-size:16px;padding:10px 0;line-height:1;width:100%;transition:all .2s}
    .nav-btn{flex:1;border:none;padding:14px;border-radius:2px;font-size:12px;font-family:'Courier New',monospace;letter-spacing:2px;font-weight:800}
    .nav-btn.secondary{background:#111;border:1px solid #2a2a2a;color:#888;flex:0.5}
    .nav-btn.primary{color:#000}
    .prev-box{background:#0d0d0d;border:1px solid #1a1a1a;border-radius:2px;padding:12px 16px;margin-bottom:16px}
    .prev-label{font-size:10px;letter-spacing:3px;color:#444;text-transform:uppercase;font-family:'Courier New',monospace;margin-bottom:8px}
    .chip-row{display:flex;gap:6px;flex-wrap:wrap}
    .prev-chip{background:#141414;border:1px solid #222;border-radius:2px;padding:5px 10px;font-size:12px;font-family:'Courier New',monospace;color:#555}
  </style>`;
}

// ─── MAIN SCREEN ─────────────────────────────────────────────────────────────
function renderMain() {
  const tabs = ["program","history","nutrition","recovery","progression"];
  const tabsHtml = tabs.map(t => `
    <button class="tab-btn ${state.activeTab===t?"tab-active":""}" data-tab="${t}">${t}</button>`).join("");

  let content = "";
  if (state.activeTab === "program") content = renderProgram();
  else if (state.activeTab === "history") content = renderHistory();
  else if (state.activeTab === "nutrition") content = renderNutrition();
  else if (state.activeTab === "recovery") content = renderRecovery();
  else if (state.activeTab === "progression") content = renderProgression();

  return `
  <div style="background:#0a0a0a;min-height:100vh">
    <div style="background:linear-gradient(135deg,#1a1a1a 0%,#111 100%);border-bottom:1px solid #222;padding:28px 24px 20px;text-align:center">
      <div style="font-size:10px;letter-spacing:6px;color:#888;text-transform:uppercase;margin-bottom:6px;font-family:'Courier New',monospace">Sculpt & Strengthen</div>
      <h1 style="font-size:clamp(26px,6vw,44px);font-weight:900;margin:0 0 4px;letter-spacing:-1px;color:#f0ede6">BUILD THE PHYSIQUE</h1>
      <p style="color:#666;margin:6px 0 0;font-size:13px;font-family:'Courier New',monospace">4-Day Split · Legs 2x/Week · 12 Weeks · Intermediate</p>
      <div style="display:flex;gap:8px;justify-content:center;margin-top:18px;flex-wrap:wrap">${tabsHtml}</div>
    </div>
    <div style="max-width:800px;margin:0 auto;padding:24px 16px">${content}</div>
  </div>
  <style>
    .tab-btn{background:transparent;color:#666;border:1px solid #333;padding:7px 14px;border-radius:2px;font-size:10px;letter-spacing:3px;text-transform:uppercase;font-family:'Courier New',monospace;transition:all .2s}
    .tab-active{background:#f0ede6 !important;color:#0a0a0a !important;border-color:#f0ede6 !important}
    .day-tab{background:#1a1a1a;color:#666;border:1px solid #2a2a2a;padding:8px 12px;border-radius:2px;font-size:11px;font-family:'Courier New',monospace;transition:all .2s}
    .ex-row{background:#0f0f0f;border:1px solid #1a1a1a;border-radius:2px;cursor:pointer;transition:all .15s}
    .ex-row:hover{border-color:#333}
    .info-card{background:#111;border:1px solid #1e1e1e;border-radius:2px;padding:16px 20px;display:flex;gap:16px;align-items:flex-start}
    .section-title{font-size:24px;margin:0 0 4px;font-weight:800;color:#f0ede6}
    .section-sub{margin:0 0 24px;color:#555;font-size:13px;font-family:'Courier New',monospace}
  </style>`;
}

function renderProgram() {
  const day = program.days[state.activeDay];
  const today = todayStr();
  const sessionKey = `${day.label}|${today}`;
  const sessionLog = state.logs[sessionKey] || {};

  const loggedCount = day.exercises.filter(ex =>
    Object.values(sessionLog[ex.name] || {}).some(s => s.weight || s.reps)
  ).length;

  const schedHtml = program.schedule.map(s => `
    <div style="background:${s.color==="#333"?"#0f0f0f":"#111"};border:1px solid ${s.color==="#333"?"#1a1a1a":s.color+"44"};border-radius:2px;padding:8px 4px;text-align:center">
      <div style="font-size:9px;font-family:'Courier New',monospace;color:${s.color==="#333"?"#333":s.color};letter-spacing:1px;margin-bottom:4px">${s.day}</div>
      <div style="font-size:8px;color:${s.color==="#333"?"#2a2a2a":"#555"};line-height:1.3">${s.label.split(" — ")[0]}</div>
    </div>`).join("");

  const dayTabsHtml = program.days.map((d, i) => `
    <button class="day-tab" data-dayidx="${i}" style="background:${state.activeDay===i?d.color:"#1a1a1a"};color:${state.activeDay===i?"#0a0a0a":"#666"};border-color:${state.activeDay===i?d.color:"#2a2a2a"};font-weight:${state.activeDay===i?"700":"400"}">
      ${d.day.slice(0,3).toUpperCase()}
    </button>`).join("");

  const exRowsHtml = day.exercises.map((ex, i) => {
    const exLog = sessionLog[ex.name] || {};
    const doneSets = Object.values(exLog).filter(s => s.done).length;
    const hasAny = Object.values(exLog).some(s => s.weight || s.reps);
    return `
    <div class="ex-row" data-exidx="${i}" style="background:${hasAny?day.color+"0d":"#0f0f0f"};border-color:${hasAny?day.color+"33":"#1a1a1a"}">
      <div style="display:grid;grid-template-columns:1fr 50px 80px 72px;padding:13px 16px;align-items:center">
        <div style="display:flex;align-items:center;gap:10px">
          <span style="width:18px;height:18px;border-radius:50%;background:${day.color}22;border:1px solid ${day.color}44;display:flex;align-items:center;justify-content:center;font-size:9px;color:${day.color};flex-shrink:0;font-family:'Courier New',monospace">${i+1}</span>
          <span style="font-size:14px;color:#d0c8b8">${ex.name}</span>
        </div>
        <div style="text-align:center;font-family:'Courier New',monospace;color:#555;font-size:13px">${ex.sets}</div>
        <div style="text-align:center;font-family:'Courier New',monospace;color:#555;font-size:12px">${ex.reps}</div>
        <div style="text-align:center">${hasAny?`<span style="font-size:11px;font-family:'Courier New',monospace;color:${day.color}">${doneSets}/${ex.sets} ✓</span>`:`<span style="font-size:11px;color:#2a2a2a;font-family:'Courier New',monospace">—</span>`}</div>
      </div>
    </div>`;
  }).join("");

  return `
    <div style="margin-bottom:24px">
      <div style="font-size:10px;letter-spacing:4px;color:#444;text-transform:uppercase;font-family:'Courier New',monospace;margin-bottom:10px">Weekly Schedule</div>
      <div style="display:grid;grid-template-columns:repeat(7,1fr);gap:4px">${schedHtml}</div>
    </div>
    <div style="display:flex;gap:6px;margin-bottom:20px;overflow-x:auto;padding-bottom:4px">${dayTabsHtml}</div>
    <div style="border-left:3px solid ${day.color};padding-left:16px;margin-bottom:20px;display:flex;justify-content:space-between;align-items:flex-start">
      <div>
        <div style="font-size:10px;color:${day.color};letter-spacing:4px;text-transform:uppercase;font-family:'Courier New',monospace;margin-bottom:2px">${day.day}</div>
        <h2 style="font-size:20px;margin:0;font-weight:800;color:#f0ede6">${day.label}</h2>
        <div style="color:#555;font-size:12px;margin-top:2px;font-family:'Courier New',monospace">${loggedCount>0?`${loggedCount}/${day.exercises.length} logged today`:`${day.exercises.length} exercises`}</div>
      </div>
      <button id="startBtn" style="background:${day.color};border:none;color:#000;padding:10px 18px;border-radius:2px;font-size:11px;font-family:'Courier New',monospace;letter-spacing:2px;font-weight:800;flex-shrink:0">▶ START</button>
    </div>
    <div style="display:flex;flex-direction:column;gap:2px">
      <div style="display:grid;grid-template-columns:1fr 50px 80px 72px;padding:6px 16px;font-size:9px;letter-spacing:3px;color:#444;text-transform:uppercase;font-family:'Courier New',monospace">
        <span>Exercise</span><span style="text-align:center">Sets</span><span style="text-align:center">Reps</span><span style="text-align:center">Today</span>
      </div>
      ${exRowsHtml}
    </div>`;
}

function renderHistory() {
  const keys = Object.keys(state.logs).sort().reverse();
  let html = `<h2 class="section-title">Workout History</h2><p class="section-sub">Every session logged — saved in your browser</p>`;
  if (!keys.length) {
    html += `<div style="text-align:center;padding:48px 24px;color:#333;font-family:'Courier New',monospace;font-size:13px;line-height:2">No sessions yet.<br>Hit ▶ START on any day to begin.</div>`;
    return html;
  }
  keys.forEach(key => {
    const [dayLabel, date] = key.split("|");
    const dayData = program.days.find(d => d.label === dayLabel);
    const color = dayData?.color || "#888";
    const session = state.logs[key];
    const exNames = Object.keys(session).filter(n => Object.values(session[n]).some(s => s.weight || s.reps));
    if (!exNames.length) return;
    let exHtml = exNames.map(exName => {
      const sets = session[exName];
      const entries = Object.entries(sets).filter(([,s]) => s.weight || s.reps);
      const chips = entries.map(([si,s]) => `<div style="background:${s.done?color+"22":"#1a1a1a"};border:1px solid ${s.done?color+"44":"#222"};border-radius:2px;padding:5px 10px;font-size:12px;font-family:'Courier New',monospace;color:${s.done?color:"#555"}">S${parseInt(si)+1}: ${s.weight?s.weight+"kg":"—"} × ${s.reps||"—"}</div>`).join("");
      return `<div style="margin-bottom:12px"><div style="font-size:11px;color:#666;margin-bottom:6px;font-family:'Courier New',monospace;letter-spacing:1px">${exName}</div><div style="display:flex;gap:6px;flex-wrap:wrap">${chips}</div></div>`;
    }).join("");
    html += `
      <div style="background:#111;border:1px solid ${color}33;border-radius:2px;overflow:hidden;margin-bottom:16px">
        <div style="background:${color}18;padding:12px 16px;border-bottom:1px solid ${color}22;display:flex;justify-content:space-between;align-items:center">
          <div><div style="font-size:10px;color:${color};letter-spacing:3px;text-transform:uppercase;font-family:'Courier New',monospace">${date}</div><div style="font-size:15px;font-weight:700">${dayLabel}</div></div>
          <div style="font-size:11px;color:#555;font-family:'Courier New',monospace">${exNames.length} exercises</div>
        </div>
        <div style="padding:14px 16px">${exHtml}</div>
      </div>`;
  });
  return html;
}

}

// ─── Events ───────────────────────────────────────────────────────────────────
function attachEvents() {
  // Tab buttons
  document.querySelectorAll(".tab-btn").forEach(btn => {
    btn.addEventListener("click", () => { state.activeTab = btn.dataset.tab; render(); });
  });

  // Day tabs
  document.querySelectorAll(".day-tab").forEach(btn => {
    btn.addEventListener("click", () => { state.activeDay = parseInt(btn.dataset.dayidx); render(); });
  });

  // Start workout
  const startBtn = document.getElementById("startBtn");
  if (startBtn) {
    startBtn.addEventListener("click", () => {
      state.tracking = { dayIdx: state.activeDay, exIdx: 0, date: todayStr() };
      render();
    });
  }

  // Exercise row click
  document.querySelectorAll(".ex-row").forEach(row => {
    row.addEventListener("click", () => {
      state.tracking = { dayIdx: state.activeDay, exIdx: parseInt(row.dataset.exidx), date: todayStr() };
      render();
    });
  });

  // Back button
  const backBtn = document.getElementById("backBtn");
  if (backBtn) backBtn.addEventListener("click", () => { state.tracking = null; render(); });

  // Tracking: set inputs
  if (state.tracking) {
    const { dayIdx, exIdx, date } = state.tracking;
    const tDay = program.days[dayIdx];
    const ex = tDay.exercises[exIdx];

    document.querySelectorAll(".set-input").forEach(input => {
      input.addEventListener("change", () => {
        setLog(tDay.label, date, ex.name, parseInt(input.dataset.set), input.dataset.field, input.value);
      });
    });

    document.querySelectorAll(".done-btn").forEach(btn => {
      btn.addEventListener("click", () => {
        const i = parseInt(btn.dataset.set);
        const key = `${tDay.label}|${date}`;
        const cur = ((state.logs[key] || {})[ex.name] || {})[i] || {};
        setLog(tDay.label, date, ex.name, i, "done", !cur.done);
        render();
      });
    });

    const prevEx = document.getElementById("prevEx");
    if (prevEx) prevEx.addEventListener("click", () => {
      state.tracking.exIdx--;
      render();
    });

    const nextEx = document.getElementById("nextEx");
    if (nextEx) nextEx.addEventListener("click", () => {
      state.tracking.exIdx++;
      render();
    });

    const finishEx = document.getElementById("finishEx");
    if (finishEx) finishEx.addEventListener("click", () => {
      state.tracking = null;
      render();
    });
  }
}

// ─── Init ─────────────────────────────────────────────────────────────────────
loadLogs();
render();
</script>
